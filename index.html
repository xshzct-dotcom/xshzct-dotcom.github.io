<!DOCTYPE html>
<!-- 向天游的随笔 v3.0 - 优化版 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>向天游的随笔</title>
  <meta name="description" content="一个怀旧的人，一个偶尔回来看看的角落。">
  <meta name="theme-color" content="#faf9f6">
  <meta http-equiv="x-dns-prefetch-control" content="on">
  <link rel="dns-prefetch" href="//github.com">
  <link rel="dns-prefetch" href="//githubusercontent.com">
  <link rel="dns-prefetch" href="//avatars.githubusercontent.com">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✒️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="images/hero_bg.jpg?v=20260715-1" fetchpriority="high">
  <link rel="stylesheet" href="style.css?v=20260721-3" media="all">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"></noscript>
  <style>body{font-family:'Cormorant Garamond','Noto Serif SC',serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;margin:0}.hero-bg{position:fixed;top:0;left:0;width:100%;height:100vh;background:url('images/hero_bg.jpg?v=20260715-1') center/cover no-repeat;z-index:0;pointer-events:none}.fade-up{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}.fade-up.visible{opacity:1;transform:translateY(0)}</style>
  <script>try{var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
</head>
<body>
  <div class="hero-bg" aria-hidden="true"></div>
  <header>
    <a href="#" class="logo">向天游</a>
    <nav>
      <a href="#albums" class="nav-link">随笔</a>
      <a href="#writing" class="nav-link">我眼中的世界</a>
      <a href="#about" class="nav-link">关于</a>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">☀️</button>
    </nav>
  </header>
  <section class="hero">
    <div class="hero-content">
      <h1>向天游的随笔</h1>
      <p>一个存放过去的角落</p>
    </div>
  </section>
  <section class="section" id="albums">
    <div class="page-title"><h1>随笔</h1></div>
    <div class="posts-grid">
      <div class="post-card fade-up" style="background-image: url('images/essay_bg.jpg')" onclick="openCardModal('essay')">
        <div class="card-overlay"><div class="card-title">随笔</div><div class="card-subtitle">童年 · 初恋 · 所思所想</div></div>
      </div>
      <div class="post-card fade-up" style="background-image: url('images/travel_bg.jpg')" onclick="openCardModal('travel')">
        <div class="card-overlay"><div class="card-title">旅行见闻</div><div class="card-subtitle">在路上</div></div>
      </div>
    </div>
  </section>
  <section class="section" id="writing">
    <div class="page-title"><h1>我眼中的世界</h1></div>
    <div class="album-grid" id="album-grid"></div>
  </section>
  <section class="about-section" id="about">
    <div class="about-inner">
      <div>
        <h2>关于网站</h2>
        <p>创建于2026年5月3号</p>
        <p>谨此纪念我曾有过的青春</p>
      </div>
    </div>
  </section>
  <footer>
    <ul><li><a href="#albums">随笔</a></li><li><a href="#writing">我眼中的世界</a></li><li><a href="#about">关于</a></li></ul>
    <p>&copy; 2026 向天游. All rights reserved.</p>
  </footer>
  <div class="music-player" id="musicPlayer">
    <div class="music-panel" id="musicPanel">
      <div class="music-info" id="musicTitle">旅行的意义</div>
      <div class="music-row">
        <button class="music-act" onclick="event.stopPropagation(); prevSong();" title="上一首">◀◀</button>
        <button class="music-act" id="playBtn" onclick="event.stopPropagation(); togglePlay();" title="播放/暂停">▶</button>
        <button class="music-act" onclick="event.stopPropagation(); nextSong();" title="下一首">▶▶</button>
      </div>
      <div class="music-track" id="musicTrack">
        <div class="music-track-bar" id="musicProgress"></div>
        <div class="music-track-thumb" id="musicThumb"></div>
      </div>
    </div>
  </div>
  <div class="modal" id="cardModal">
    <div class="modal-header">
      <button class="modal-back" id="modalBack" onclick="modalGoBack()" style="visibility:hidden;">← 返回</button>
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
  <div class="pwd-overlay" id="pwdOverlay" style="display:none">
    <div class="pwd-box">
      <div class="pwd-title">旧世界</div>
      <div class="pwd-hint">提示：作者真实名字</div>
      <input type="password" class="pwd-input" id="pwdInput" placeholder="请输入密码" maxlength="8" />
      <div class="pwd-error" id="pwdError"></div>
      <div class="pwd-actions">
        <button class="pwd-btn pwd-btn-cancel" onclick="closePwdModal()">取消</button>
        <button class="pwd-btn pwd-btn-ok" onclick="checkPwd()">确定</button>
      </div>
    </div>
  </div>
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <button class="lightbox-nav lightbox-prev" onclick="changePhoto(-1)" aria-label="上一张">‹</button>
    <button class="lightbox-nav lightbox-next" onclick="changePhoto(1)" aria-label="下一张">›</button>
    <div class="lightbox-stage" id="lightboxStage">
      <div class="lightbox-thumb" id="lightboxThumb"></div>
      <img id="lightboxImg" src="" alt="" />
    </div>
    <div class="lightbox-loader" id="lightboxLoader">
      <svg class="progress-ring" viewBox="0 0 52 52">
        <circle class="progress-ring-bg" cx="26" cy="26" r="20"/>
        <circle class="progress-ring-bar" id="progressRingBar" cx="26" cy="26" r="20"/>
      </svg>
      <div class="lightbox-progress-text" id="lightboxProgressText">0%</div>
    </div>
    <div class="lightbox-loading-text" id="lightboxLoadingText">加载中</div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>
  <div class="album-zoom-hint" id="zoomHint">按住 Ctrl + 滚动鼠标滚轮缩放缩略图</div>
  <audio id="bgMusic" preload="none"></audio>
  
  <!-- 阅读进度条 -->
  <div class="read-progress" id="readProgress"></div>
  
  <!-- 回到顶部 -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
  </button>
  
  <!-- 页面过渡遮罩 -->
  <div class="page-transition" id="pageTransition"></div>
  
  <script defer src="data.js?v=20260715-1"></script>
  <script>
  // 照片路径：新上传的走 Supabase（相册管理器），旧照片保持 GitHub
  // 新照片由 album-editor.js 上传到 Supabase，data.js 里的旧照片维持 GitHub
  </script>
  <script defer src="script.js?v=20260715-1"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script defer src="essay-editor.js?v=20260721-9"></script>
  <script defer src="album-editor.js?v=20260721-1"></script>
  <script defer src="music-editor.js?v=20260721-3"></script>
  <script defer src="settings-menu.js?v=20260721-1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>向天游的随笔 · Memories</title>
<meta name="description" content="一个存放过去的角落">
<meta name="theme-color" content="#0E1116">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="style.css?v=hotfix2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter','Noto Serif SC',system-ui,sans-serif;background:#0E1116;color:#E8E4DA;margin:0}
/* 灯箱核心 CSS — 内联!important 确保 SW 缓存旧版 style.css 也不影响 */
.lightbox{position:fixed;inset:0;z-index:200;background:#000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;overflow:hidden}
.lightbox.active{opacity:1!important;pointer-events:auto!important}
.lightbox-stage{position:absolute;inset:0;display:none!important;visibility:hidden!important}
.lightbox-img{display:none!important;visibility:hidden!important;width:0!important;height:0!important;max-width:0!important;max-height:0!important;opacity:0!important;pointer-events:none!important}
.lightbox-close,.lightbox-prev,.lightbox-next{position:fixed;z-index:201;width:44px;height:44px;border-radius:50%;font-size:1.5rem;color:#E8E4DA;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.1);transition:all .2s}
.lightbox-close{top:20px;right:24px}.lightbox-prev{left:20px;top:50%;transform:translateY(-50%)}.lightbox-next{right:20px;top:50%;transform:translateY(-50%)}
.lightbox-counter{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:201;color:#E8E4DA;font-size:.85rem;letter-spacing:.5px}
.lightbox-filmstrip{position:fixed;bottom:0;left:0;right:0;z-index:201;display:flex;gap:6px;overflow-x:auto;padding:12px 16px;background:linear-gradient(0deg,#000 60%,transparent)}
.lightbox-filmstrip .fs-item{flex:0 0 auto;width:64px;height:64px;border-radius:4px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:border .2s}
.lightbox-filmstrip .fs-item.active{border-color:#7C9B7E}
.lightbox-filmstrip .fs-item img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>

<!-- Navigation -->
<nav class="nav" id="nav">
  <a class="nav-brand" href="#hero">向<em>天游</em></a>
  <div class="nav-links" id="navLinks">
    <a href="#essays">随笔</a>
    <a href="#gallery">相册</a>
    <a href="#about">关于</a>
  </div>
  <div class="nav-hamburger" id="navHamburger">
    <span></span><span></span><span></span>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn nav-shuffle" id="navShuffle" title="随机回忆" aria-label="随机回忆">🎲</button>
    <button class="nav-icon-btn nav-shuffle" id="testLb" title="测试灯箱" aria-label="测试灯箱" style="font-size:1.1rem">🔍</button>
    <button class="nav-icon-btn nav-gear" id="navGear" title="管理菜单" aria-label="管理菜单">⚙️</button>
  </div>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <canvas id="heroStars"></canvas>
  <div class="hero-content">
    <h1 class="hero-title">向<em>天游</em>的随笔</h1>
    <p class="hero-sub">一个存放过去的角落</p>
  </div>
  <div class="hero-scroll" onclick="document.getElementById('essays').scrollIntoView({behavior:'smooth'})">⌄</div>
</section>

<!-- Essays Timeline -->
<section class="section" id="essays">
  <h2 class="section-title">随<em>笔</em></h2>
  <div class="timeline" id="timeline"></div>
</section>

<!-- Memory River — 记忆河流 -->
<section class="section" id="gallery">
  <h2 class="section-title">我<em>眼</em>中的世界</h2>
  <div class="river-filters" id="viewerFilters"></div>
  <div class="river-hint" id="riverHint"></div>
  <div class="river" id="memRiver">
    <div class="river-stream" id="riverStream"></div>
  </div>
  <div class="river-controls">
    <button class="river-ctrl river-prev" onclick="riverScroll(-1)">‹</button>
    <button class="river-ctrl river-next" onclick="riverScroll(1)">›</button>
    <button class="river-ctrl river-shuffle" onclick="riverShuffle()" title="换一批">🎲 换一批</button>
  </div>
</section>

<!-- About with Year Heatmap -->
<section class="section about" id="about">
  <h2 class="section-title">关<em>于</em></h2>
  <p>创建于2026年5月3号</p>
  <p>谨此纪念我曾有过的青春</p>
  <div class="year-heatmap" id="yearHeatmap">
    <div class="heatmap-title">回忆热力图</div>
    <div class="heatmap-grid" id="heatmapGrid"></div>
    <div class="heatmap-legend">
      <span>少</span>
      <div class="heatmap-cell" data-level="0"></div>
      <div class="heatmap-cell" data-level="1"></div>
      <div class="heatmap-cell" data-level="2"></div>
      <div class="heatmap-cell" data-level="3"></div>
      <div class="heatmap-cell" data-level="4"></div>
      <span>多</span>
    </div>
  </div>
  <div class="heatmap-tooltip" id="heatmapTooltip"></div>
</section>

<!-- Music Player -->
<div class="player" id="player">
  <div class="player-toggle" id="playerToggle" onclick="togglePlayer()">⌃</div>
  <div class="player-info" id="playerTitle">那个夏天</div>
  <div class="player-visualizer" id="playerVisualizer">
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="player-controls">
    <button onclick="prevSong()" title="上一首">◀◀</button>
    <button id="playBtn" onclick="togglePlay()" title="播放/暂停">▶</button>
    <button onclick="nextSong()" title="下一首">▶▶</button>
  </div>
  <div class="player-bar" id="playerBar" onclick="seek(event)">
    <div class="player-progress" id="playerProgress"></div>
  </div>
</div>

<!-- Lightbox (全屏 + 缩放/平移) -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <button class="lightbox-next" onclick="navLightbox(1)">›</button>
  <div class="lightbox-zoom-indicator" id="lightboxZoomIndicator">100%</div>
  <div class="lightbox-stage" id="lightboxStage">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <div class="lightbox-loader" id="lightboxLoader">加载中…</div>
  <div class="lightbox-filmstrip" id="lightboxFilmstrip"></div>
</div>

<!-- Modal (essay reading) -->
<div class="modal-overlay" id="essayModal">
  <div class="modal-content" id="essayModalContent"></div>
</div>

<!-- Editor Panel -->
<div class="editor-backdrop" id="editorBackdrop"></div>
<div class="editor-panel" id="editorPanel">
  <button class="editor-close" id="editorClose">×</button>
  <div class="editor-tabs" id="editorTabs">
    <button class="editor-tab active" data-tab="essay">文章</button>
    <button class="editor-tab" data-tab="album">相册</button>
    <button class="editor-tab" data-tab="music">音乐</button>
  </div>
  <div class="editor-body" id="editorBody"></div>
</div>

<!-- Password Overlay -->
<div class="pwd-overlay" id="pwdOverlay">
  <div class="pwd-box">
    <h3>旧世界</h3>
    <p style="margin-top:8px">提示：作者真实名字</p>
    <input type="password" id="pwdInput" placeholder="请输入密码" maxlength="8">
    <p class="pwd-error" id="pwdError"></p>
    <button class="pwd-btn-ok" onclick="checkPwd()">确定</button>
    <button class="pwd-btn-cancel" onclick="closePwdModal()">取消</button>
  </div>
</div>

<!-- Daily Quote (开场浮层) -->
<div class="daily-quote" id="dailyQuote">
  <div class="dq-mark">"</div>
  <div class="dq-text" id="dailyQuoteText">Loading...</div>
  <div class="dq-author">—— <em id="dailyQuoteAuthor">未知</em></div>
</div>

<audio id="bgMusic" preload="none"></audio>

<script src="../data.js?v=20260721-3"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// 灯箱核心 — 内联到 HTML，script.js 加载后会用自己的版本覆盖
// 如果 script.js 被 SW 缓存了旧版，这里的版本仍能工作
(function(){
  var _idx = 0, _total = 0;

  function open(idx) {
    var imgs = document.querySelectorAll('.masonry-item img');
    var photos = []; imgs.forEach(function(el){ photos.push(el.src); });
    _total = photos.length; _idx = Math.max(0, Math.min(idx, _total-1));
    if(_total === 0) return;

    var lb = document.getElementById('lightbox');
    var img = document.getElementById('lightboxImg');
    lb.style.opacity = '1'; lb.classList.add('active');
    document.body.style.overflow = 'hidden';

    // 原图: /thumbs/.../x.webp → /images/.../x.jpg
    img.src = photos[_idx].replace(/\/thumbs\//, '/images/').replace(/\.webp$/i, '.jpg');
    img.style.opacity = '0';
    img.onload = function(){ img.style.opacity = '1'; };
    document.getElementById('lightboxCounter').textContent = (_idx+1) + ' / ' + _total;
  }

  function close() {
    var lb = document.getElementById('lightbox');
    lb.classList.remove('active'); lb.style.opacity = '0';
    document.body.style.overflow = '';
  }

  function nav(dir) {
    _idx += dir;
    if(_idx < 0) _idx = _total - 1;
    if(_idx >= _total) _idx = 0;
    open(_idx);
  }

  // 暴露到 window（script.js 加载后会用自己的版本覆盖）
  window.openLightbox = open;
  window.closeLightbox = close;
  window.navLightbox = nav;

  // 别名兼容
  window.openLightboxFallback = open;
  window.closeLightboxFallback = close;

  // 键盘事件
  document.addEventListener('keydown', function(e) {
    var lb = document.getElementById('lightbox');
    if(!lb || !lb.classList.contains('active')) return;
    if(e.key === 'Escape') close();
    if(e.key === 'ArrowLeft') nav(-1);
    if(e.key === 'ArrowRight') nav(1);
  });

  // 测试按钮
  console.log('[memories-fallback] ready, photos='+document.querySelectorAll('.masonry-item img').length);
  window._lbDebug = function(i) { console.log('[memories-fallback] photo onclick idx='+i); };
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('testLb');
    if(btn) btn.onclick = function(e) { e.preventDefault(); console.log('[memories-fallback] test button clicked, calling open(0)'); open(0); };
  });
  setTimeout(function(){
    var btn = document.getElementById('testLb');
    if(btn) btn.onclick = function(e) { e.preventDefault(); console.log('[memories-fallback] test button (immediate) clicked'); open(0); };
  }, 100);
})();
</script>
<script src="script.js?v=hotfix2"></script>
<script src="editor.js?v=20260721-11"></script>
</body>
</html>
